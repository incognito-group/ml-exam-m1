<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Morpion - AI Tic-Tac-Toe</title>
    <link rel="stylesheet" href="css/home.css">
  </head>
  <body>
    <div class="contenaire">
        <div class="mode">
          <p>Mode de jeu</p>
            <ul class="mode">
                 <li id="mode-1v1">2 joueurs</li>
                 <li id="mode-hybrid">Hybride</li>
                 <li id="mode-ai">Vs IA</li>
            </ul>
        </div>
        <div class="tableau">
                <table id="game-board">
                  <tr>
                    <td id="cell-0"></td>
                    <td id="cell-1"></td>
                    <td id="cell-2"></td>
                  </tr>
                  <tr>
                    <td id="cell-3"></td>
                    <td id="cell-4"></td>
                    <td id="cell-5"></td>
                  </tr>
                  <tr>
                    <td id="cell-6"></td>
                    <td id="cell-7"></td>
                    <td id="cell-8"></td>
                  </tr>
                </table>
                <div class="modal_hidden">
                  <div class="modal-box">
                    <Span class="close-button">&times;</Span>
                    <h2 id="message">Partie terminée</h2>
                    <button onclick="restart()">Rejouer</button>
                  </div>
                </div> 
          </div>
      </div>
      <script src="home.js"></script>
  </body>
</html>
